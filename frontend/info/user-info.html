<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Info</title>
    <link rel="stylesheet" href="user-info.css">
    <script src="user-info.js" defer></script>
</head>

<body>

<div class="info-container">

    <!-- HEADER -->
    <div class="info-header">

        <button onclick="goBack()">←</button>

        <img id="avatar" class="avatar">

        <div class="info-title">
            <h2 id="username"></h2>
            <p id="user-id"></p>
        </div>

        <button id="menu-btn">⋮</button>

    </div>

    <!-- MENU -->
    <div id="menu" class="menu hidden">
        <button onclick="blockUser()">Block User</button>
        <button onclick="addContact()">Add to Contacts</button>
        <button onclick="archive()">Add to Archive</button>
    </div>

</div>

</body>
</html>
