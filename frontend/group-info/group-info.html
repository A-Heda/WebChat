<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Group Info</title>
    <link rel="stylesheet" href="group-info.css">
</head>

<body>

<div class="container">

    <div class="header">
        <button onclick="goBack()">←</button>
        <h2>Group Info</h2>
    </div>


    <div class="profile">

        <img id="avatar" src="../assets/group.png">

        <h3 id="group-name">Group Name</h3>

        <p id="group-id">Group ID: ---</p>

        <p id="members">0 members</p>

    </div>


    <div class="actions">

        <button onclick="leaveGroup()">Leave Group</button>

        <button onclick="addMember()">Add Member</button>

        <button onclick="editGroup()">Edit Group</button>

        <button onclick="openArchive()">Add to Archive</button>

        <button onclick="openHistory()">History</button>

    </div>

</div>


<!-- ADD MEMBER MODAL -->
<div id="add-member-modal" class="modal hidden">

    <div class="modal-content">

        <h3>Add Member</h3>

        <input
            type="text"
            id="member-id"
            placeholder="Enter User ID">


        <div class="modal-buttons">

            <button onclick="closeAddMember()">
                Cancel
            </button>


            <button onclick="submitAddMember()">
                Add
            </button>

        </div>

    </div>

</div>


<script src="group-info.js"></script>

</body>
</html>
