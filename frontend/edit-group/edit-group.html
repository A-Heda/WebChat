<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Group</title>
    <link rel="stylesheet" href="edit-group.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <button onclick="goBack()">←</button>
            <h2>Edit Group</h2>
        </div>

        <div class="profile">

            <img id="avatar" src="../assets/group.png">

            <input type="file" id="imageInput" accept="image/*">

        </div>

        <div class="form">

            <label>Group Name</label>

            <input id="group-name" type="text">

            <label>Group ID</label>

            <label>Group ID</label>

            <input id="group-id" type="text" readonly>

            <button onclick="saveChanges()">
                Save Changes
            </button>

        </div>

    </div>

    <script src="edit-group.js"></script>

</body>

</html>
