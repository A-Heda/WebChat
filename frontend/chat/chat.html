<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blink Chat</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="chat.js" defer></script>
</head>

<body>

<div class="chat-container">

    <header class="chat-header">

        <button id="back-btn">←</button>
        <button id="home-btn">🏠</button>

        <img id="chat-avatar" class="chat-avatar" src="../assets/default.png">

        <div class="chat-title" id="open-info">
            <h2 id="chat-name"></h2>
            <p id="chat-subtitle"></p>
        </div>

        <input id="search-box" placeholder="Search messages...">

        <button id="menu-button">⋮</button>

    </header>


    <div id="chat-menu" class="chat-menu hidden"></div>


    <div id="messages-container" class="messages-container"></div>


    <div class="message-input">

        <input type="text" id="message-input" placeholder="Type a message...">

        <input type="file" id="media-input" hidden>
        <button id="media-btn">📎</button>

        <button id="send-button">Send</button>

    </div>

</div>

</body>
</html>
