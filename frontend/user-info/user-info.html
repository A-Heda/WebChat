<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Info</title>
    <link rel="stylesheet" href="user-info.css">
</head>
<body>

<div class="container">


    <div class="header">
        <button onclick="goBack()">←</button>
        <h2>User Info</h2>
    </div>


    <div class="profile">
        <img id="avatar" src="../assets/default.png">

        <h3 id="name">User Name</h3>
        <p id="username">@username</p>
        <p id="user-id">ID: ---</p>
    </div>


    <div class="section">
        <h4>Mutual Groups</h4>
        <div id="groups"></div>
    </div>


    <div class="actions">

        <button onclick="blockUser()">Block User</button>
        <button onclick="addContact()">Add to Contacts</button>
        <button onclick="archiveUser()">Add to Archive</button>

    </div>

</div>

<script src="user-info.js"></script>
</body>
</html>
